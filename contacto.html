<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <meta name="author" content="Ignacio Navarro" />
    <meta name="description" content="Contacta con Ignacio Navarro, desarrollador web"/>
    <link rel="icon" type="image/x-icon" href="./img/common/favicon.ico"/>
    <title>Contacto</title>
    <link rel="stylesheet" href="./css/contacto.css">
  </head>
  <body data-page="contacto">

    <!-- Aquí irá el HEADER, que se cargará en main.js mediante módulos-->

    <main>
      <section>
        <h1>Contacta conmigo</h1>
        <p>Rellena los siguientes datos y mándame tu consulta.</p>

        <form>
          <!-- Datos Personales -->
          <fieldset>
            <legend>Información Personal</legend>

            <label for="nombre_completo" class="required">Nombre Completo:</label>
            <input
              type="text"
              id="nombre_completo"
              name="nombre_completo"
              placeholder="Escribe tu nombre"
              required
              aria-required="true"
            />

            <label for="email" class="required">Email:</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="tunombre@correo.com"
              required
              aria-required="true"
            />
          </fieldset>

          <!-- Consulta -->
          <fieldset>
            <legend>Realiza tu consulta</legend>

            <label for="asunto" class="required">Asunto:</label>
            <input
              type="text"
              id="asunto"
              name="asunto"
              placeholder="Asunto"
              required
              aria-required="true"
            />

            <label for="message" class="required">Mensaje:</label>
            <textarea
              id="message"
              name="message"
              rows="5"
              cols="40"
              placeholder="Escribe aquí..."
              required
              aria-required="true"
            ></textarea>
          </fieldset>

          <!-- Botones -->
          <div class="form-actions">
            <button type="submit">Enviar</button>
            <button type="reset">Borrar formulario</button>
          </div>
        </form>
      </section>
    </main>

    <!-- Aquí irá el FOOTER, que se cargará en main.js mediante módulos-->

  <script type="module" src="./js/main.js"></script>
  </body>
</html>
